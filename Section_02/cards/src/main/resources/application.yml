server:
  port: 9000

spring:
  application:
    name: cards
  h2:
    console:
      enabled: true # Enable the H2 Console UI in your browser
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: 'sa'
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true


